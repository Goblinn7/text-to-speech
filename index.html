<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TTS Web App - Sidoarjo Edition</title>
    <link rel="stylesheet" href="style.css">

    <style>
        body { position: relative; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }

        .auth-btn {
            position: absolute;
            top: 20px;
            left: 20px;
        }

        .auth-btn button {
            padding: 8px 15px;
            margin-right: 5px;
            cursor: pointer;
            border-radius: 5px;
            border: none;
            background: #444;
            color: white;
            transition: 0.3s;
        }

        .auth-btn button:hover { background: #666; }

        #userInfo {
            position: absolute;
            top: 20px;
            right: 20px;
            color: white;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        #userInfo button {
            background: #ff4d4d;
            border: none;
            color: white;
            padding: 6px 12px;
            border-radius: 5px;
            cursor: pointer;
        }

        #authModal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }

        .modal-box {
            background: #1e1e1e;
            padding: 30px;
            border-radius: 12px;
            width: 320px;
            text-align: center;
            color: white;
            border: 1px solid #333;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }

        .modal-box input {
            width: 90%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 5px;
            border: 1px solid #444;
            background: #222;
            color: white;
        }

        .modal-box button {
            width: 100%;
            margin-top: 10px;
            padding: 12px;
            cursor: pointer;
            border-radius: 5px;
            border: none;
            background: #007bff;
            color: white;
            font-weight: bold;
        }

        .section { 
            margin-top: 50px; 
            padding: 25px; 
            background: rgba(255,255,255,0.05); 
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        /* Styling Area Koreksi AI */
        .correction-box {
            background: rgba(0, 255, 213, 0.1);
            border: 1px dashed #00ffd5;
            padding: 12px;
            margin: 10px 0;
            border-radius: 8px;
            display: none;
            font-size: 0.95em;
            line-height: 1.4;
        }

        #loading {
            color: #00ffd5;
            font-style: italic;
            margin-bottom: 10px;
            font-size: 0.85em;
        }

        #adminContainer h2 { color: #ffcc00; margin-bottom: 20px; }
        .admin-user { 
            background: #2c2c2c; 
            padding: 15px; 
            margin-bottom: 15px; 
            border-radius: 8px; 
            border-left: 5px solid #ffcc00;
            text-align: left;
        }
    </style>
</head>

<body>

<div class="auth-btn" id="guestButtons">
    <button onclick="openAuth('login')">Login</button>
    <button onclick="openAuth('register')">Register</button>
</div>

<div id="userInfo">Belum login</div>

<div id="authModal">
    <div class="modal-box">
        <h2 id="authTitle">Login</h2>
        <input type="text" id="username" placeholder="Username">
        <input type="password" id="password" placeholder="Password">
        <button onclick="handleAuth()">Submit</button>
        <button onclick="closeAuth()" style="background:#555; margin-top:5px;">Close</button>
    </div>
</div>

<div class="hero">
    <h1>Text To Speech <span>Converter</span></h1>

    <div class="language-bar">
        <select id="fromLang">
            <option value="auto">Auto Detect</option>
            <option value="id">Indonesian</option>
            <option value="en">English</option>
        </select>
        <button type="button" id="swapLang">⇄</button>
        <select id="toLang">
            <option value="en">English</option>
            <option value="id">Indonesian</option>
        </select>
    </div>

    <textarea id="inputText" placeholder="Write anything here (e.g., 'i go to school yesterday')..."></textarea>
    
    <div id="loading" style="display:none;">✨ AI is checking your grammar...</div>
    <div id="correctionPreview" class="correction-box"></div>

    <div class="row">
        <select id="voiceSelect"></select>
        <button type="button" id="listenBtn">🔊 Listen</button>
        
        <button type="button" id="translateBtn">Translate</button>

        <select id="posterTheme">
            <option value="sunset">Monumen Jayandaru</option>
            <option value="ocean">Candi Sumur</option>
            <option value="dark">Candi Dermo</option>
            <option value="nature">Candi Pari</option>
        </select>
        <button onclick="generatePoster()" style="background: #ffcc00; color: #000;">Generate Poster</button>
    </div>

    <div id="translationResult"></div>

    <div class="poster-container" style="text-align:center; margin-top: 20px;">
        <canvas id="posterCanvas" width="1000" height="800" style="display:none; max-width: 100%; border-radius: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.3);"></canvas>
        <br>
        <button id="downloadBtn" style="display:none; margin-top: 15px; background: #28a745;">⬇️ Download Poster</button>
    </div>

    <div class="section">
        <h2>📜 History</h2>
        <div id="historyContainer"></div>
        <button onclick="clearHistory()" style="margin-top: 15px; background: #666;">Clear All History</button>
    </div>

    <div id="adminArea" class="section" style="display: none;">
        <div id="adminContainer"></div>
    </div>
</div>

<script src="script.js" defer></script>
<script src="user/history.js" defer></script>
<script src="admin/admin.js" defer></script>

<script>
let isLoginMode = true;

// ================= MODAL LOGIC =================
function openAuth(mode) {
    isLoginMode = (mode === "login");
    document.getElementById("authTitle").innerText = isLoginMode ? "Login" : "Register";
    document.getElementById("authModal").style.display = "flex";
}

function closeAuth() {
    document.getElementById("authModal").style.display = "none";
}

// ================= AUTH HANDLER (MONGODB) =================
async function handleAuth() {
    const user = document.getElementById("username").value;
    const pass = document.getElementById("password").value;

    if (!user || !pass) {
        alert("Username dan Password wajib diisi!");
        return;
    }

    const endpoint = isLoginMode ? "/api/login" : "/api/register";

    try {
        const res = await fetch(endpoint, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ username: user, password: pass })
        });

        const data = await res.json();

        if (res.ok) {
            localStorage.setItem("currentUser", data.user ? data.user.username : user);
            localStorage.setItem("role", data.user ? data.user.role : "user");

            updateUserUI();
            closeAuth();
            window.location.reload(); 
        } else {
            alert(data.error || "Gagal Autentikasi");
        }
    } catch (err) {
        console.error(err);
        alert("Server Error! Pastikan database sudah terhubung.");
    }
}

// ================= UI UPDATE LOGIC =================
function updateUserUI() {
    const user = localStorage.getItem("currentUser");
    const role = localStorage.getItem("role");
    const userInfo = document.getElementById("userInfo");
    const guestButtons = document.getElementById("guestButtons");
    const adminArea = document.getElementById("adminArea");

    if (user && user !== "undefined") {
        guestButtons.style.display = "none";
        userInfo.innerHTML = `
            <span style="font-weight:bold;">👤 ${user} <small style="opacity:0.7;">(${role})</small></span>
            <button onclick="logout()">Logout</button>
        `;

        if (role === "admin") {
            adminArea.style.display = "block";
        }
    } else {
        guestButtons.style.display = "block";
        userInfo.innerHTML = "Belum login";
        adminArea.style.display = "none";
    }
}

function logout() {
    localStorage.removeItem("currentUser");
    localStorage.removeItem("role");
    window.location.reload();
}

window.onload = () => {
    updateUserUI();
};
</script>

</body>
</html>
